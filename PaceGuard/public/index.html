<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>

                <span>激光配速带</span>
            </div>
            <div class="connection-status connected">
                <span class="status-text">已连接</span>
                <svg class="ph-bluetooth-connected" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M200,176a8,8,0,0,1-3.2,6.4l-64,48A8,8,0,0,1,128,232a8,8,0,0,1-8-8V144L68.8,182.4a8,8,0,0,1-9.6-12.8L114.67,128,59.2,86.4a8,8,0,0,1,9.6-12.8L120,112V32a8,8,0,0,1,12.8-6.4l64,48a8,8,0,0,1,0,12.8L141.33,128l55.47,41.6A8,8,0,0,1,200,176ZM72,128a12,12,0,1,0-12,12A12,12,0,0,0,72,128Zm132-12a12,12,0,1,0,12,12A12,12,0,0,0,204,116Z"/></svg>
            </div>
        </header>

        <!-- Main Content -->
        <main class="dashboard">
            <!-- Status Card -->
            <div class="card status-card">
                <div class="pace-group">
                    <label>实时配速</label>
                    <div class="value-large">
                        <span id="currentPace">5'30"</span>
                        <span class="unit">/km</span>
                    </div>
                </div>
                <div class="divider"></div>
                <div class="pace-group target-group">
                    <label>目标配速</label>
                    <div class="value-editable">
                        <svg class="ph-pencil-simple" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M227.31,73.37,182.63,28.68a16,16,0,0,0-22.63,0L36.69,152A15.86,15.86,0,0,0,32,163.31V208a16,16,0,0,0,16,16H92.69A15.86,15.86,0,0,0,104,219.31L227.31,96a16,16,0,0,0,0-22.63ZM92.69,208H48V163.31l88-88L180.69,120ZM192,108.68,147.31,64l24-24L216,84.68Z"/></svg>
                        <span id="targetPaceDisplay">5'00"</span>
                    </div>
                </div>
            </div>

            <!-- Visualizer -->
            <div class="card visualizer-card">
                <div class="visualizer-header">
                    <span>相对位置</span>
                    <svg class="ph-info" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm16-40a8,8,0,0,1-8,8,16,16,0,0,1-16-16V128a8,8,0,0,1,0-16,16,16,0,0,1,16,16v40A8,8,0,0,1,144,176ZM112,84a12,12,0,1,1,12,12A12,12,0,0,1,112,84Z"/></svg>
                </div>
                <div class="track-container">
                    <div class="track-line"></div>
                    <div class="indicator center-marker" title="你 (跑者)">
                        <div class="dot runner-dot"></div>
                    </div>
                    <div class="indicator rabbit-marker" id="rabbitIndicator" title="激光 (兔子)">
                        <div class="dot rabbit-dot"></div>
                        <div class="rabbit-glow"></div>
                    </div>
                </div>
                <div class="visualizer-labels">
                    <span>落后</span>
                    <span>领先</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="control-section">
                <button id="toggleBtn" class="btn-primary">
                    <span class="btn-content">
                        <svg id="icon-play" class="ph-fill ph-play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M240,128a15.74,15.74,0,0,1-7.6,13.51L88.32,229.65a16,16,0,0,1-16.2.3A15.86,15.86,0,0,1,64,216.13V39.87a15.86,15.86,0,0,1,8.12-13.82,16,16,0,0,1,16.2.3L232.4,114.49A15.74,15.74,0,0,1,240,128Z"/></svg><svg id="icon-stop" class="ph-fill ph-stop" style="display:none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M216,56V200a16,16,0,0,1-16,16H56a16,16,0,0,1-16-16V56A16,16,0,0,1,56,40H200A16,16,0,0,1,216,56Z"/></svg>

                    </span>
                </button>
            </div>

            <div class="mode-switcher">
                <div class="mode-option active" data-mode="steady">

                    <span>定速巡航</span>
                </div>
                <div class="mode-option" data-mode="interval">
                    <svg class="ph-chart-bar" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M224,200h-8V40a8,8,0,0,0-8-8H152a8,8,0,0,0-8,8V80H96a8,8,0,0,0-8,8v40H48a8,8,0,0,0-8,8v64H32a8,8,0,0,0,0,16H224a8,8,0,0,0,0-16ZM160,48h40V200H160ZM104,96h40V200H104ZM56,144H88v56H56Z"/></svg>
                    <span>间歇训练</span>

            </div>
