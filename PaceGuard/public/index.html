<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>激光配速带控制</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Top Header -->
        <header class="header">
            <div class="device-info">
                <svg class="ph-watch" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M208,128a79.94,79.94,0,0,0-32.7-64.47l-6.24-34.38A16,16,0,0,0,153.32,16H102.68A16,16,0,0,0,86.94,29.15L80.7,63.53a79.9,79.9,0,0,0,0,128.94l6.24,34.38A16,16,0,0,0,102.68,240h50.64a16,16,0,0,0,15.74-13.15l6.24-34.38A79.94,79.94,0,0,0,208,128ZM102.68,32h50.64l3.91,21.55a79.75,79.75,0,0,0-58.46,0ZM64,128a64,64,0,1,1,64,64A64.07,64.07,0,0,1,64,128Zm89.32,96H102.68l-3.91-21.55a79.75,79.75,0,0,0,58.46,0ZM120,128V88a8,8,0,0,1,16,0v32h32a8,8,0,0,1,0,16H128A8,8,0,0,1,120,128Z"/></svg>
                <span>激光配速带</span>
            </div>
            <div class="connection-status">
                <button id="scanBtn" class="btn-icon" title="搜索设备">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M229.66,218.34l-50.07-50.06a88.11,88.11,0,1,0-11.31,11.31l50.06,50.07a8,8,0,0,0,11.32-11.32ZM40,112a72,72,0,1,1,72,72A72.08,72.08,0,0,1,40,112Z"/></svg>
                </button>
                <button id="disconnectBtn" class="btn-icon" title="断开连接" style="display: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M205.66,194.34a8,8,0,0,1-11.32,11.32L128,139.31,61.66,205.66a8,8,0,0,1-11.32-11.32L116.69,128,50.34,61.66A8,8,0,0,1,61.66,50.34L128,116.69l66.34-66.35a8,8,0,0,1,11.32,11.32L139.31,128Z"/></svg>
                </button>
                <span id="statusText" class="status-text">未连接</span>
                <svg class="ph-bluetooth-connected" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M200,176a8,8,0,0,1-3.2,6.4l-64,48A8,8,0,0,1,128,232a8,8,0,0,1-8-8V144L68.8,182.4a8,8,0,0,1-9.6-12.8L114.67,128,59.2,86.4a8,8,0,0,1,9.6-12.8L120,112V32a8,8,0,0,1,12.8-6.4l64,48a8,8,0,0,1,0,12.8L141.33,128l55.47,41.6A8,8,0,0,1,200,176ZM72,128a12,12,0,1,0-12,12A12,12,0,0,0,72,128Zm132-12a12,12,0,1,0,12,12A12,12,0,0,0,204,116Z"/></svg>
            </div>
        </header>

        <!-- Running Controls -->
        <div id="runningControls" class="card settings-card" style="display: none;">
            <div class="settings-header" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
                <span id="runningSettingsTitle" style="font-weight: bold;">跑步设置（配速模式）</span>
                <textarea id="runningStatusArea" readonly style="width: 140px; height: 32px; resize: none; background-color: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 6px; padding: 4px 8px; font-family: inherit; font-size: 16px; font-weight: bold; color: #FF0000; line-height: 22px; overflow: hidden; white-space: nowrap;"></textarea>
            </div>
            
            <div class="settings-body">
                <div class="setting-item">
                    <label id="cadenceLabel">步频 (步/分钟)</label>
                    <div class="input-wrapper">
                        <input type="number" id="cadenceInput" value="180" placeholder="180" min="1">
                        <span id="cadenceUnit" class="unit">SPM</span>
                    </div>
                </div>
                <div class="setting-item">
                    <label id="paceLabel">配速 (min'sec''/km)</label>
                    <div id="paceInputContainer" class="pace-input-wrapper">
                        <input type="number" id="paceMinInput" value="5" placeholder="5" min="0">
                        <span class="separator">'</span>
                        <input type="number" id="paceSecInput" value="30" placeholder="30" min="0" max="59">
                        <span class="separator">''</span>
                    </div>
                    <div id="gameRewardInputContainer" class="input-wrapper" style="display: none;">
                        <input type="number" id="rewardDistanceInput" value="100" placeholder="100" min="1">
                        <span class="unit">m</span>
                    </div>
                </div>
                <button id="syncSettingsBtn" class="btn-primary">同步目标</button>
                <button id="switchModeBtn" class="btn-secondary" style="margin-top: 8px;">切换模式</button>
            </div>
            
            <div class="settings-header" style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color);">结果展示</div>
            <div class="settings-body">
                <div class="setting-item">
                    <label>时间 (min'sec'')</label>
                    <div class="input-wrapper">
                        <input type="text" id="resultTime" readonly value="--" style="background-color: var(--bg-secondary); cursor: default;">
                    </div>
                </div>
                <div class="setting-item">
                    <label>距离 (km)</label>
                    <div class="input-wrapper">
                        <input type="text" id="resultDistance" readonly value="--" style="background-color: var(--bg-secondary); cursor: default;">
                    </div>
                </div>
            </div>
            
            <div class="settings-header" style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color);">跑步控制</div>
            <div class="settings-body" style="display: flex; gap: 12px; margin-top: 8px;">
                <button id="runControlBtn" class="btn-primary btn-start" style="flex: 1;">开始跑步</button>
                <button id="stopRunBtn" class="btn-primary btn-stop" style="flex: 1;">结束跑步</button>
            </div>
        </div>

        <!-- Chat Interface (Hidden) -->
        <!--
        <div id="chatContainer" class="card chat-card" style="display: none;">
            <div id="messageLog" class="message-log">
                <div class="message system-message">等待连接...</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="输入消息..." />
                <button id="sendBtn" class="btn-primary-small">发送</button>
            </div>
        </div>
        -->

        <!-- Mode Switcher -->

        <!-- Device Scan Modal -->
        <div id="scanModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>附近的 BLE 设备</h3>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <ul id="deviceList" class="device-list">
                        <!-- Devices will be populated here -->
                    </ul>
                    <div id="scanLoading" class="scan-loading" style="display: none;">
                        <div class="spinner"></div>
                        <span>正在搜索...</span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="refreshScanBtn" class="btn-secondary">刷新</button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
